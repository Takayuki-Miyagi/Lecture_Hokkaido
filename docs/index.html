<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Lecture Chatbot</title>
  <link rel="stylesheet" href="./style.css" />

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [["\\(", "\\)"], ["$", "$"]],
        displayMath: [["\\[", "\\]"], ["$$", "$$"]],
        processEscapes: true,
        processEnvironments: true
      }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <h1>講義内容チャットボット (質問内容ははOpenAIに抜かれるので注意してください)</h1>
        <p>講義内容について質問できます．</p>
      </div>
      <button id="clear">Clear</button>
    </header>
    <main id="chat-log" class="chat-log"></main>

    <footer class="composer">
      <textarea
        id="question"
        rows="1"
        placeholder="講義内容について質問してください。Shift+Enterで改行。"
      ></textarea>
      <button id="ask">Send</button>
    </footer>
  </div>

  <script src="./chat.js"></script>
</body>
</html>
